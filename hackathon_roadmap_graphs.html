<h1 id="%F0%9F%9A%80-disrupt-ai-hackathon-2026--%E6%AE%B5%E9%9A%8E%E7%9A%84%E5%B1%95%E9%96%8B%E3%83%AD%E3%83%BC%E3%83%89%E3%83%9E%E3%83%83%E3%83%97"><img class="emoji" draggable="false" alt="🚀" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f680.svg" data-marp-twemoji=""/> DISRUPT AI Hackathon 2026 — 段階的展開ロードマップ</h1>
<blockquote>
<p><strong>正式イベント名</strong>: DISRUPT AI Hackathon 2026（）<br />
<strong>会場</strong>: QUINTBRIDGE（大阪・NTT西日本本社内）<br />
<strong>運営主体</strong>: DISRUPT AI Hackathon 2026 運営事務局（コアメンバー6名）<br />
<strong>発起人・総合統括</strong>: 田窪 佑一朗 氏<br />
<strong>後援・外部連携</strong>: 本多 竜之介 氏（JGCI アドバイザー） ｜ 一般社団法人 Japan Grand Challenge研究会（JGCI） / 他、複数自治体および自治体連携団体<br />
<strong>ターゲット</strong>: AI技術に興味関心のある学生（文系・理系問わず）<br />
<strong>想定規模</strong>: 参加者80名以上（Phase 3 フラグシップ開催時）<br />
<strong>策定日</strong>: 2026年5月26日</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="ja-JP">
<h2 id="%E3%82%B9%E3%83%86%E3%83%BC%E3%82%AF%E3%83%9B%E3%83%AB%E3%83%80%E3%83%BC%E3%81%A8%E9%96%8B%E5%82%AC%E4%BD%93%E5%88%B6%E5%BA%A7%E7%B5%84">ステークホルダーと開催体制（座組）</h2>
<p>本ハッカソンを成功させるため、「すでに味方として連携しているコアメンバー」「今後説得・巻き込みが必要なパートナー」「価値を提供するターゲット」の3層に分けてステークホルダーを整理します。</p>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="ja-JP">
<h2 id="%E4%BC%81%E7%94%BB%E3%82%B3%E3%83%B3%E3%82%BB%E3%83%97%E3%83%88">企画コンセプト</h2>
<blockquote>
<p><strong>「文系も参加しやすく、理系も物足りなさを感じないAIハッカソン」</strong></p>
</blockquote>
<p>本イベントの核心は、学生がAIを単なるツールとして使うのではなく、<strong>AIを活用したビジネス・社会実装・課題解決を真剣に考える場を提供すること</strong>にあります。</p>
<p>単なる技術コンテストではなく、学生が社会課題・地域課題を自らリサーチし、AI・ノーコード技術を活用して社会実装可能なアイデアへ落とし込む**実践型イベント（アントレプレナーシップ教育）**として設計します。</p>
<h3 id="%E3%81%AA%E3%81%9C%E6%96%87%E7%B3%BB%E3%83%BB%E7%90%86%E7%B3%BB%E6%B7%B7%E5%90%88%E3%81%AA%E3%81%AE%E3%81%8B">なぜ「文系・理系混合」なのか</h3>
<p>AI時代の価値創出には、技術だけではなく、課題発見・ユーザー理解・企画設計・事業性・発信力が不可欠。ノーコードAIを活用することで技術経験の有無に関わらず参加でき、かつ審査でAI活用の妥当性・実装可能性・社会実装性まで評価することで、理系にとっても挑戦価値のあるイベントにします。</p>

</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="ja-JP">
<h2 id="%E6%9C%AC%E4%BC%81%E7%94%BB%E3%81%AEmust%E5%BF%85%E9%A0%88%E3%81%A8hope%E5%B8%8C%E6%9C%9B">本企画の「MUST（必須）」と「HOPE（希望）」</h2>
<p>本プロジェクトを推進するにあたり、何があっても死守すべき最低ライン（MUST）と、理想的な大成功ライン（HOPE）を切り分けて整理します。これにより、運営チーム内での意思決定基準を明確にします。</p>
<h3 id="%F0%9F%94%B4-must%E7%B5%B6%E5%AF%BE%E3%81%AB%E9%81%94%E6%88%90%E3%83%BB%E6%AD%BB%E5%AE%88%E3%81%99%E3%81%B9%E3%81%8D%E3%83%A9%E3%82%A4%E3%83%B3"><img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f534.svg" data-marp-twemoji=""/> MUST（絶対に達成・死守すべきライン）</h3>
<p>本ハッカソンの「存続と意義」に関わる必須要件です。</p>
<ol>
<li><strong>開催規模</strong>: Phase 1（アイデアソン）および Phase 2（50名規模ハッカソン）の確実な開催。</li>
<li><strong>参加者負担</strong>: 学生の<strong>参加費完全無料</strong>の維持。</li>
<li><strong>会場</strong>: QUINTBRIDGEの<strong>無償利用枠</strong>の獲得（または代替無料会場の確保）。</li>
<li><strong>資金確保</strong>: 弁当代・交通費など、最低限の運営費（約40〜50万円）を賄う小〜中規模スポンサーの獲得。</li>
<li><strong>提供価値</strong>: 文系・理系問わず、ノーコード・生成AIを利用した「動くプロトタイプ」の実装成功体験の提供。</li>
</ol>
<h3 id="%F0%9F%8C%9F-hope%E9%81%94%E6%88%90%E3%81%A7%E3%81%8D%E3%82%8C%E3%81%B0%E5%A4%A7%E6%88%90%E5%8A%9F%E3%81%A8%E3%81%AA%E3%82%8B%E7%90%86%E6%83%B3%E3%83%A9%E3%82%A4%E3%83%B3"><img class="emoji" draggable="false" alt="🌟" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f31f.svg" data-marp-twemoji=""/> HOPE（達成できれば大成功となる理想ライン）</h3>
<p>本企画の影響力を最大化し、次なる展開（事業化・法人化等）へと繋げるための希望要件です。</p>
<ol>
<li><strong>開催規模</strong>: Phase 3（80〜100名規模・3日間合宿形式）の統合型フラグシップ開催。</li>

<h2 id="%E9%81%8B%E5%96%B6%E4%BD%93%E5%88%B6%E3%81%A8%E5%BD%B9%E5%89%B2%E5%88%86%E6%8B%8580%E5%90%8D%E8%A6%8F%E6%A8%A1%E5%AF%BE%E5%BF%9C">運営体制と役割分担（80名規模対応）</h2>
<p>80名以上の参加者を6名のコア運営メンバーで安全かつ高品質に運営するため、**発起人・総合統括（田窪氏）<strong>および</strong>外部連携（本多氏）<strong>と強固な協力ラインを結び、さらに</strong>「当日ボランティアスタッフ（学生10〜15名）」**を組織化して運営体制を拡張します。</p>
<h3 id="%E9%81%8B%E5%96%B6%E7%B5%84%E7%B9%94%E5%9B%B3">運営組織図</h3>
<p><img src="./hackathon_roadmap_graphs-3.svg" alt="diagram" /></p>
<h3 id="%E9%81%8B%E5%96%B6%E3%83%A1%E3%83%B3%E3%83%90%E3%83%BC%E3%82%B3%E3%82%A26%E5%90%8D%E3%81%AE%E5%85%B7%E4%BD%93%E7%9A%84%E8%B2%AC%E5%8B%99">運営メンバー（コア6名）の具体的責務</h3>
<h4 id="%E2%91%A0-%E7%B5%B1%E6%8B%ACpm--%E3%83%97%E3%83%AD%E3%83%87%E3%83%A5%E3%83%BC%E3%82%B5%E3%83%BC">① 統括PM / プロデューサー</h4>
<ul>
<li><strong>全体責務</strong>: 予算管理、全体スケジュール統括、緊急時の最終意思決定。</li>
<li><strong>外部連携</strong>: 総合統括の田窪氏との進捗同期（週次）、外部連携の本多氏との協賛交渉・進捗調整。</li>
<li><strong>当日役割</strong>: 運営本部の指揮、タイムテーブル遅延時の調整、審査の取りまとめ。</li>
</ul>
<h4 id="%E2%91%A1-mc--%E3%83%95%E3%82%A1%E3%82%B7%E3%83%AA%E3%83%86%E3%83%BC%E3%82%BF%E3%83%BC">② MC / ファシリテーター</h4>
<ul>
<li><strong>全体責務</strong>: 当日の司会進行、アイスブレイク設計、ワークショップのファシリテーション。</li>
<li><strong>資料連携</strong>: デザイン担当と連携したスライド構成、本多氏と連携した企業紹介プログラムの進行。</li>
<li><strong>当日役割</strong>: タイムキーパーと連携したスムーズな進行、会場の熱量コントロール。</li>
</ul>
<h4 id="%E2%91%A2-%E3%83%86%E3%83%83%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%89">③ テックリード</h4>
<ul>
<li><strong>全体責務</strong>: 技術環境（Wi-Fi、電源、APIキー配布）の設計、事前ハンズオンの設計。</li>
<li><strong>外部連携</strong>: 本多氏の紹介による協賛企業メンター（5〜8名）への技術ブリーフィング、メンターシフト管理。</li>
<li><strong>当日役割</strong>: 技術トラブル対応、デモ動作環境のサポート、技術メンタリングの統括。</li>
</ul>
<h4 id="%E2%91%A3-%E3%83%87%E3%82%B6%E3%82%A4%E3%83%B3--%E3%82%B3%E3%83%B3%E3%83%86%E3%83%B3%E3%83%84">④ デザイン / コンテンツ</h4>
<ul>
<li><strong>全体責務</strong>: イベントのビジュアルアイデンティティ（ロゴ、スライド、看板等）のデザイン。</li>
<li><strong>当日役割</strong>: 記録写真・動画のリアルタイム撮影、SNS投稿用画像編集、Day 1のデザイン指導。</li>
</ul>
<h4 id="%E2%91%A4-%E3%82%B3%E3%83%9F%E3%83%A5%E3%83%8B%E3%83%86%E3%82%A3--%E5%BA%83%E5%A0%B1">⑤ コミュニティ / 広報</h4>
<ul>
<li><strong>全体責務</strong>: 参加者集客、大学・サークル営業、Discordコミュニティ運営。</li>
<li><strong>体制拡張</strong>: <strong>当日ボランティアスタッフ（学生10〜15名）の公募・採用・事前レクチャー</strong>の統括。</li>
<li><strong>当日役割</strong>: 受付デスクの統括、当日ボランティアへのタスク指示（チーム担当アサイン）。</li>
</ul>
<h4 id="%E2%91%A5-%E4%BC%9A%E5%A0%B4--%E3%83%AD%E3%82%B8%E3%82%B9%E3%83%86%E3%82%A3%E3%82%AF%E3%82%B9">⑥ 会場 / ロジスティクス</h4>
<ul>
<li><strong>全体責務</strong>: QUINTBRIDGE担当者とのレイアウト・インフラ調整、備品・ケータリング発注。</li>
<li><strong>体制拡張</strong>: **当日ボランティアスタッフの会場シフト管理（受付、ゴミ回収、配膳、誘導等）**の統括。</li>
<li><strong>当日役割</strong>: 会場セッティング・撤収指揮、ケータリング配膳管理、インフラ（電源ドラム等）監視。</li>
</ul>
</section>

<h2 id="80%E5%90%8D%E8%A6%8F%E6%A8%A1%E5%AF%BE%E5%BF%9C%E3%81%AE%E5%BD%93%E6%97%A5%E3%81%AE%E9%81%8B%E5%96%B6%E3%82%AA%E3%83%9A%E3%83%AC%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3%E8%A8%AD%E8%A8%88">80名規模対応の当日の運営オペレーション設計</h2>
<h3 id="1-%E4%BD%93%E5%88%B6%E8%A3%9C%E5%BC%B7%E5%BD%93%E6%97%A5%E3%83%9C%E3%83%A9%E3%83%B3%E3%83%86%E3%82%A3%E3%82%A2%E3%83%BB%E4%BC%81%E6%A5%AD%E3%83%A1%E3%83%B3%E3%82%BF%E3%83%BC%E4%BD%93%E5%88%B6">1. 体制補強（当日ボランティア・企業メンター体制）</h3>
<ul>
<li><strong>当日スタッフ体制</strong>: 80名以上の参加者が集まると、受付、弁当配布、会場誘導、ゴミ回収などの物理的作業が劇的に増加します。これをコア6名でこなすとハッカソンの品質管理（メンタリングや進行）が破綻するため、<strong>学生ボランティア10〜15名を公募・配置</strong>します。</li>
<li><strong>協賛企業メンターの活用</strong>: 16〜20チームが同時開発を行うため、運営側のテックリード1名では質問対応が不可能です。<strong>協賛企業から技術・ビジネスメンターを計5〜8名招致</strong>し、メンタリングシフト表を作成して各チームを漏れなく定期巡回する体制を構築します。</li>
</ul>
<h3 id="2-%E3%83%87%E3%82%B8%E3%82%BF%E3%83%AB%E5%8C%96%E3%81%AB%E3%82%88%E3%82%8B%E9%80%B2%E8%A1%8C%E3%81%AE%E5%8A%B9%E7%8E%87%E5%8C%96">2. デジタル化による進行の効率化</h3>
<ul>
<li><strong>QRコード受付</strong>: 事前にGoogleフォーム等で発行したQRコードをスマホで提示してもらい、受付スピードを3倍化。</li>
<li><strong>Discord / LINEのフル活用</strong>: 会場での全体アナウンスは聞こえづらいため、運営からのお知らせ（タイムテーブル変更、お弁当配布開始等）はDiscordの特定チャンネルへのメンション配信で一斉周知します。</li>
<li><strong>デモ事前チェックシート</strong>: 発表直前の接続トラブル（画面が映らない、音が鳴らない）を防止するため、Day 3の昼に全チームにデモ確認用ディスプレイへ接続させ、動作確認を義務化します。</li>
</ul>
<h3 id="3-%E5%B8%B8%E6%99%82%E3%83%A1%E3%83%B3%E3%82%BF%E3%83%AA%E3%83%B3%E3%82%B0%E3%81%A8%E3%83%AC%E3%82%B9%E3%82%AD%E3%83%A5%E3%83%BC%E5%88%B6%E5%BA%A6">3. 常時メンタリングとレスキュー制度</h3>
<ul>
<li><strong>定期巡回メンタリング</strong>: メンター陣には各チーム最低1日3回（午前、午後、夕方）の巡回を義務付け、進行状況を「開発中」「詰まり中」「コンセプト迷走中」の3段階でスプレッドシート等にリアルタイム記録。</li>
<li><strong>レッドカード（レスキュー）制度</strong>: 各チームのテーブルに「赤色のカード」を配置。これを立てているチームには、テックリードまたはビジネスメンターが即座に駆けつけるオペレーションを導入します。</li>
</ul>
</section>

<p>本イベントは単発で終わらせず、関西圏における継続的なAI人材育成と企業・自治体連携の仕組み（IP化・法人化）へ発展させることを見据えます。</p>

<td>年2回（春・夏）の開催サイクルを確立し、関西圏の学生AI人材の登竜門としての地位を確立。</td>
</tr>
<tr>
<td><strong>イベントフォーマットのIP化</strong></td>
<td>審査基準、ワークシート、当日スライド、Discord運営設計をパッケージ化し、他地域でも開催可能なライセンスIPとして確立。</td>
</tr>
<tr>
<td><strong>実践型インターン接続</strong></td>
<td>優秀なアウトプットを見せたチームや個人を、協賛企業のAI実装プロジェクトや新規事業開発インターンシップへ直接紹介。</td>
</tr>
<tr>
<td><strong>運営基盤の法人化</strong></td>
<td>継続的な協賛金受け入れ、自治体との公式契約、知的財産（IP）管理を円滑に行うため、将来的な「一般社団法人」などの法人格取得を視野に入れる。</td>
